apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replica-test
  labels:
    purpose: teach
    project: robo
spec:
  replicas: 2
  selector:
    matchLabels:
      purpose: teach
      project: robo
  template:
    metadata:
      labels:
        purpose: teach
        project: robo
    spec:
      containers:
        - name: nginx
          image: nginx:trixie-perl
